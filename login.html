<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — Revolution Gym</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--fire:#FF1F00;--ember:#FF5500;--black:#060606;--ink:#0e0e0e;--steel:#161616;--plate:#1f1f1f;--mist:#2a2a2a;--ash:#666;--chalk:#aaa;--white:#f0f0f0;--ease:cubic-bezier(0.19,1,0.22,1);}
html,body{height:100%;font-family:'Barlow',sans-serif;background:var(--black);color:var(--white);}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.025;}

.page-wrap{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;position:relative;z-index:1;}

.left-panel{
  background:linear-gradient(135deg,var(--black),#0a0000);
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;justify-content:space-between;padding:48px;
}
.left-panel::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 60% 40%,rgba(255,31,0,.16) 0%,transparent 65%),repeating-linear-gradient(rgba(255,31,0,.04) 0,rgba(255,31,0,.04) 1px,transparent 1px,transparent 56px),repeating-linear-gradient(90deg,rgba(255,31,0,.04) 0,rgba(255,31,0,.04) 1px,transparent 1px,transparent 56px);}
.brand-logo{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:5px;position:relative;z-index:1;}
.brand-logo em{color:var(--fire);font-style:normal;}
.left-hero{position:relative;z-index:1;margin-top:auto;padding-bottom:20px;}
.left-big{font-family:'Bebas Neue',sans-serif;font-size:clamp(4rem,9vw,8rem);line-height:.85;letter-spacing:.02em;}
.left-big .fire{color:var(--fire);}
.left-quote{margin-top:24px;padding:20px 24px;border-left:2px solid rgba(255,31,0,.3);font-size:.92rem;color:rgba(255,255,255,.45);line-height:1.75;font-style:italic;}
.left-quote strong{color:var(--white);font-style:normal;}

.right-panel{background:var(--ink);border-left:1px solid rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;padding:48px;}
.login-box{width:100%;max-width:440px;}
.login-title{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;letter-spacing:2px;margin-bottom:6px;}
.login-sub{font-size:.88rem;color:var(--ash);margin-bottom:36px;}
.login-sub a{color:var(--fire);}

.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;}
.form-label{font-family:'Barlow Condensed',sans-serif;font-size:.65rem;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,.4);}
.form-input{background:var(--plate);border:1px solid rgba(255,255,255,.08);color:var(--white);padding:14px 16px;font-family:'Barlow',sans-serif;font-size:.92rem;transition:border-color .3s;width:100%;}
.form-input:focus{outline:none;border-color:var(--fire);}
.form-input::placeholder{color:rgba(255,255,255,.2);}
.pass-wrap{position:relative;}
.pass-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--ash);font-size:.75rem;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;}

.forgot-row{text-align:right;margin-top:-8px;margin-bottom:24px;}
.forgot-row a{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.25);transition:color .2s;}
.forgot-row a:hover{color:var(--fire);}

.submit-btn{width:100%;font-family:'Barlow Condensed',sans-serif;font-size:.82rem;letter-spacing:4px;text-transform:uppercase;font-weight:700;background:var(--fire);color:var(--black);padding:18px;border:none;cursor:pointer;clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);transition:background .25s,transform .25s;display:flex;align-items:center;justify-content:center;gap:10px;}
.submit-btn:hover{background:var(--ember);transform:translateY(-2px);}
.submit-btn:disabled{background:var(--mist);color:var(--ash);cursor:not-allowed;transform:none;}
.spinner{width:16px;height:16px;border:2px solid rgba(0,0,0,.3);border-top-color:var(--black);border-radius:50%;animation:spin .7s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}

.global-err{margin-top:14px;padding:12px 16px;background:rgba(255,31,0,.1);border:1px solid rgba(255,31,0,.3);font-size:.84rem;color:var(--fire);display:none;}
.global-err.show{display:block;}

.divider{display:flex;align-items:center;gap:16px;margin:28px 0;font-family:'Barlow Condensed',sans-serif;font-size:.65rem;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.2);}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06);}

.join-link{display:block;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:.75rem;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.35);border:1px solid rgba(255,255,255,.1);padding:14px;transition:border-color .3s,color .3s;}
.join-link:hover{border-color:rgba(255,31,0,.3);color:var(--fire);}

@media(max-width:900px){.page-wrap{grid-template-columns:1fr;}.left-panel{display:none;}.right-panel{min-height:100vh;}}
</style>
</head>
<body>
<div class="page-wrap">
  <div class="left-panel">
    <div class="brand-logo"><em>REV</em>OLUTION GYM</div>
    <div class="left-hero">
      <div class="left-big">WELCOME<br><span class="fire">BACK.</span></div>
      <div class="left-quote">"The only bad workout is the one that <strong>didn't happen.</strong> You're back. That's all that matters."<br><br>— Arjun Deshmukh, Head Coach</div>
    </div>
  </div>
  <div class="right-panel">
    <div class="login-box">
      <h1 class="login-title">Sign In</h1>
      <p class="login-sub">Don't have an account? <a href="join.html">Join Revolution →</a></p>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="pass-wrap">
            <input type="password" class="form-input" id="password" placeholder="Your password" required>
            <span class="pass-toggle" onclick="togglePass()">SHOW</span>
          </div>
        </div>
        <div class="forgot-row"><a href="#">Forgot password?</a></div>

        <button type="submit" class="submit-btn" id="submitBtn">
          <span id="btnText">Sign In →</span>
          <div class="spinner" id="spinner"></div>
        </button>
        <div class="global-err" id="globalErr"></div>
      </form>

      <div class="divider">or</div>
      <a href="join.html" class="join-link">Create New Account</a>
      <div style="margin-top:20px;text-align:center;">
        <a href="index.html" style="font-family:'Barlow Condensed',sans-serif;font-size:.65rem;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.18);">← Back to Website</a>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<script>
function togglePass() {
  const inp = document.getElementById('password');
  const btn = document.querySelector('.pass-toggle');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? 'SHOW' : 'HIDE';
}

function showError(msg) {
  const el = document.getElementById('globalErr');
  el.textContent = msg; el.classList.add('show');
}

async function handleLogin(e) {
  e.preventDefault();
  document.getElementById('globalErr').classList.remove('show');
  const email = document.getElementById('email').value.trim().toLowerCase();
  const pass  = document.getElementById('password').value;
  const btn   = document.getElementById('submitBtn');
  document.getElementById('btnText').textContent = 'Signing in...';
  document.getElementById('spinner').style.display = 'block';
  btn.disabled = true;

  try {
    const user   = await signIn(email, pass);
    const member = await getMember(user.uid);
    if (member?.role === 'admin' || member?.role === 'superadmin') {
      window.location.href = 'admin.html';
    } else {
      window.location.href = 'dashboard.html';
    }
  } catch(err) {
    let msg = 'Invalid email or password.';
    if (err.code === 'auth/too-many-requests') msg = 'Too many attempts. Try again in a few minutes.';
    if (err.code === 'auth/user-not-found')    msg = 'No account found with this email.';
    if (err.code === 'auth/wrong-password')    msg = 'Incorrect password.';
    if (err.code === 'auth/invalid-email')     msg = 'Please enter a valid email address.';
    if (err.code === 'auth/network-request-failed') msg = 'Network error. Check your internet connection.';
    showError(msg);
    document.getElementById('btnText').textContent = 'Sign In →';
    document.getElementById('spinner').style.display = 'none';
    btn.disabled = false;
  }
}

window.addEventListener('DOMContentLoaded', async () => {
  // If already logged in via Firebase, redirect
  try {
    const user = await getCurrentUser();
    if (user) {
      const member = await getMemberCached(user.uid);
      if (member?.role === 'admin' || member?.role === 'superadmin') {
        window.location.href = 'admin.html';
      } else {
        window.location.href = 'dashboard.html';
      }
    }
  } catch(e) {}
});
</script>
</body>
</html>
